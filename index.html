    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      .container {
        padding: 30vh 5vw 6vh 5vw;

        /* Add overflows and z-index because the marketing site does this too for many containers */
        overflow: hidden;
        position: relative;
        z-index: 1;
      }
      .dark {
        background-color: #2b2d42;
      }
      .light {
        background-color: #eee;
      }
    </style>

  <body>
    <div class="container dark">
      <div style="max-width: 540px">
        <bpc-address-search
          public-key="%VITE_GOOGLE_MAPS_API_KEY%"
          cta="See if my home qualifies"
        ></bpc-address-search>
        <script>
          (() => {
            const el = document.currentScript.previousElementSibling;
            el.addEventListener("select", (e) =>
              console.log("select", e.detail),
            );
            el.addEventListener("result", (e) => {
              const url = new URL(
                e.detail.result.redirectUrl,
                window.location.origin,
              );
              url.searchParams.set("utm_source", "bpc-web-components");
              url.searchParams.set("utm_medium", "address-search");
              url.searchParams.set("utm_campaign", "bpc-web-components");

              // window.location.href = url.href;
              console.log("Would redirect to:", url.href);
            });
          })();
        </script>
      </div>
    </div>
    <div class="container dark" style="padding-top: 6vh">
      <div style="max-width: 540px">
        <!-- `mode="zip"` renders the zip-first entry. -->
        <bpc-address-search
          mode="zip"
          public-key="%VITE_GOOGLE_MAPS_API_KEY%"
          cta="See if my home qualifies"
        ></bpc-address-search>
        <script>
          (() => {
            const el = document.currentScript.previousElementSibling;
            el.addEventListener("result", (e) => {
              const url = new URL(
                e.detail.result.redirectUrl,
                window.location.origin,
              );
              url.searchParams.set("utm_source", "bpc-web-components");
              url.searchParams.set("utm_medium", "address-search");
              url.searchParams.set("utm_campaign", "bpc-web-components");

              // window.location.href = url.href;
              console.log("zip result", e.detail);
              console.log("Would redirect to:", url.href);
            });
            el.addEventListener("error", (e) =>
              console.log("zip error", e.detail),
            );
          })();
        </script>
      </div>
    </div>
    <div class="container light">
      <div style="max-width: 540px">
        <bpc-address-search
          public-key="%VITE_GOOGLE_MAPS_API_KEY%"
        ></bpc-address-search>
        <script>
          (() => {
            const el = document.currentScript.previousElementSibling;
            el.addEventListener("select", (e) =>
              console.log("select", e.detail),
            );
            el.addEventListener("result", (e) =>
              console.log("result", e.detail),
            );
          })();
        </script>
      </div>
    </div>
    <div
      style="
        max-width: 540px;
        background-color: white;
        padding: 20px;
        z-index: 5;
        position: relative;
      "
    >
      This is a z-index test
    </div>
  </body>
</html>
